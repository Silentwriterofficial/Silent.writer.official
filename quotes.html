<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://jiulxnhlhshbiwcjjadj.supabase.co";
const supabaseKey = "sb_publishable_BTFHCv7F__3rNqN_pCSL3w_g7znAt8Y";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);


// загрузка лайков
async function loadQuoteLikes() {
  const buttons = document.querySelectorAll(".quote-like-btn");

  for (const btn of buttons) {
    const quoteId = btn.dataset.id;

    const { data, error } = await supabaseClient
      .from("quotes")
      .select("likes")
      .eq("id", quoteId)
      .single();

    if (!error && data) {
      const countEl = document.querySelector(`[data-quote-count="${quoteId}"]`);
      if (countEl) countEl.textContent = data.likes ?? 0;
    }
  }
}


// лайк
async function addQuoteLike(quoteId, btn) {

  const localKey = "liked_quote_" + quoteId;

  if (localStorage.getItem(localKey)) {
    btn.disabled = true;
    btn.classList.add("liked");
    btn.querySelector(".heart").textContent = "♥";
    return;
  }

  const { data, error } = await supabaseClient.rpc("increment_quote_likes", {
    quote_id: quoteId
  });

  if (error) {
    console.error("Ошибка лайка:", error);
    alert("Не удалось поставить лайк");
    return;
  }

  const countEl = document.querySelector(`[data-quote-count="${quoteId}"]`);
  if (countEl) countEl.textContent = data;

  localStorage.setItem(localKey, "true");

  btn.disabled = true;
  btn.classList.add("liked");
  btn.querySelector(".heart").textContent = "♥";
}


// обработка кнопок
document.querySelectorAll(".quote-like-btn").forEach(btn => {

  const quoteId = btn.dataset.id;
  const localKey = "liked_quote_" + quoteId;

  if (localStorage.getItem(localKey)) {
    btn.disabled = true;
    btn.classList.add("liked");
    btn.querySelector(".heart").textContent = "♥";
  }

  btn.addEventListener("click", () => {
    addQuoteLike(quoteId, btn);
  });

});


loadQuoteLikes();
</script>
